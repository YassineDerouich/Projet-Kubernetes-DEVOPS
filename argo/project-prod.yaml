apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: prod
  namespace: argocd
spec:
  description: "environnement prod complet"
  sourceRepos:
  - "git@github.com:YassineDerouich/projet_cloud_security.git"

  destinations:
  - namespace: frontend
    server: https://kubernetes.default.svc
  - namespace: backend
    server: https://kubernetes.default.svc
  - namespace: database
    server: https://kubernetes.default.svc

  namespaceResourceWhitelist:
  - group: 'apps'
    kind: Deployment
  - group: 'apps'
    kind: StatefulSet
  - group: 'argoproj.io'
    kind: Rollout
  - group: 'argoproj.io'
    kind: AnalysisTemplate
  - group: ''
    kind: Service
  - group: ''
    kind: ConfigMap
  - group: ''
    kind: Secret
  - group: ''
    kind: ServiceAccount
  - group: ''
    kind: PersistentVolumeClaim
  - group: 'networking.k8s.io'
    kind: Ingress
  - group: 'networking.k8s.io'
    kind: NetworkPolicy
  - group: 'autoscaling'
    kind: HorizontalPodAutoscaler
  - group: 'external-secrets.io'
    kind: ExternalSecret

  clusterResourceWhitelist: []
