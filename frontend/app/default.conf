server {

    listen 8080;
    server_name localhost;
    # canary 	
    # Cacher la version d'nginx
    server_tokens off;

    # Protection Clickjacking
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Location des pages
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        
	# Redirige vers index.html si la ressource n'est pas trouvé
        try_files $uri $uri/ /index.html;
    }

    # Toutes les requêtes commençant par /api/ seront envoyées au backend
    location /api/ {
        # "backend-svc" sera le nom de notre futur Service Kubernetes pour le nodeJs
        proxy_pass http://backend-svc.backend.svc.cluster.local:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
